<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Today's Lunch</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.2/css/bulma.min.css" />
    <link rel="stylesheet" th:href="@{/style.css}" />
    <style>
      /* ─── Base ─────────────────────────────────────────────────── */
      :root { --navbar-h: 52px; }

      /* Fixed navbar: shrink items so it never wraps on mobile */
      .navbar.is-fixed-top { min-height: var(--navbar-h); }
      .navbar-brand .navbar-item { padding: 0 0.75rem; }
      .navbar-end { display: flex; align-items: center; flex-wrap: nowrap; overflow: hidden; }
      .navbar-end .navbar-item { padding: 0 0.5rem; white-space: nowrap; }

      /* Hide date + GitHub on small screens so navbar stays 1 line */
      @media (max-width: 640px) {
        .navbar-date, .navbar-github { display: none !important; }
      }

      /* Body: push below fixed navbar + iOS notch */
      body {
        padding-top: calc(var(--navbar-h) + env(safe-area-inset-top, 0px));
      }

      /* ─── Section / container ───────────────────────────────────── */
      .section {
        padding: 1rem 0.75rem;
      }
      @media (min-width: 769px) {
        .section { padding: 2rem 1.5rem; }
      }

      /* ─── Columns: stack on mobile, side-by-side on tablet+ ────── */
      .columns {
        display: flex;
        flex-direction: column;
        margin: 0;
      }
      .column { padding: 0.5rem 0; }
      @media (min-width: 769px) {
        .columns { flex-direction: row; gap: 1.5rem; }
        .column { padding: 0; }
        .column.is-8 { flex: 0 0 66.6%; max-width: 66.6%; }
        .column.is-4 { flex: 0 0 33.3%; max-width: 33.3%; }
      }

      /* ─── Column order on mobile ────────────────────────────────── */
      /* Status first, then proposals, then who's here at the bottom  */
      #col-main         { order: 1; }
      #col-participants { order: 2; }
      @media (min-width: 769px) {
        #col-main         { order: 1; }
        #col-participants { order: 2; }
      }

      /* ─── Box ───────────────────────────────────────────────────── */
      .box { margin-bottom: 0.85rem; }
      @media (max-width: 600px) {
        .box { padding: 1rem 0.85rem; margin-bottom: 0.75rem; }
      }

      /* ─── Status buttons: side-by-side & full width on mobile ───── */
      #status-panel .buttons { gap: 0.5rem; }
      @media (max-width: 600px) {
        #status-panel .buttons { display: grid; grid-template-columns: 1fr 1fr; }
        #status-panel .button  { width: 100%; margin: 0 !important; }
      }

      /* ─── Proposal rows ─────────────────────────────────────────── */
      .proposal-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 0.4rem;
        padding: 0.5rem 0;
        border-bottom: 1px solid #f0f0f0;
      }
      .proposal-row:last-child { border-bottom: none; }
      .proposal-row .row-info {
        flex: 1 1 auto;
        min-width: 0;
        word-break: break-word;
      }
      .proposal-row .row-action { flex: 0 0 auto; }

      /* ─── Addons / input rows ───────────────────────────────────── */
      @media (max-width: 600px) {
        .field.has-addons { flex-direction: column; align-items: stretch; }
        .field.has-addons .control { width: 100%; }
        .field.has-addons .control .input,
        .field.has-addons .control .button {
          width: 100%;
          border-radius: 4px !important;
        }
        .field.has-addons .control + .control { margin-top: 0.4rem; }
      }

      /* ─── Who's Here: compact list ──────────────────────────────── */
      .participant-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0.3rem 0;
        border-bottom: 1px solid #f5f5f5;
        font-size: 0.95rem;
      }
      .participant-row:last-child { border-bottom: none; }

      /* ─── Name-entry modal ──────────────────────────────────────── */
      .name-modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.55);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        padding: 1rem;
        padding-top: calc(1rem + env(safe-area-inset-top, 0px));
      }
      .name-modal-box {
        background: #fff;
        border-radius: 10px;
        padding: 2rem 1.5rem;
        max-width: 400px;
        width: 100%;
        box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        text-align: center;
      }
      .name-modal-box .modal-icon { font-size: 2.5rem; margin-bottom: 0.4rem; }
      .name-modal-box h2 { font-size: 1.3rem; font-weight: 700; margin-bottom: 0.3rem; }
      .name-modal-box p  { color: #666; margin-bottom: 1rem; font-size: 0.95rem; }
      .name-modal-error  { color: #cc3333; font-size: 0.85rem; margin-top: 0.5rem; min-height: 1.2em; }
      @media (max-width: 480px) {
        .name-modal-box .field.has-addons { flex-direction: column; }
        .name-modal-box .field.has-addons .control { width: 100%; }
        .name-modal-box .field.has-addons .control .input,
        .name-modal-box .field.has-addons .control .button {
          width: 100%; border-radius: 4px !important;
        }
        .name-modal-box .field.has-addons .control + .control { margin-top: 0.5rem; }
      }
    </style>
  </head>
  <body class="has-background-light">

    <!-- ── Name-entry modal ─────────────────────────────────────────── -->
    <div id="name-modal-overlay" class="name-modal-overlay"
         th:attr="style=${needsName} ? null : 'display:none'">
      <div class="name-modal-box">
        <div class="modal-icon">🍱</div>
        <h2>Who are you?</h2>
        <p>Enter your name to join today's lunch session.</p>
        <div class="field has-addons" style="justify-content:center">
          <div class="control is-expanded">
            <input id="modal-name-input" class="input" type="text"
                   placeholder="Your name" maxlength="40" autofocus
                   onkeydown="if(event.key==='Enter') submitModalName()" />
          </div>
          <div class="control">
            <button class="button is-primary" onclick="submitModalName()">Join</button>
          </div>
        </div>
        <div id="modal-name-error" class="name-modal-error"></div>
      </div>
    </div>

    <!-- ── Navbar ───────────────────────────────────────────────────── -->
    <nav class="navbar is-primary is-fixed-top" role="navigation" aria-label="main navigation">
      <div class="navbar-brand">
        <span class="navbar-item has-text-weight-bold is-size-6">🍱 Daily Takeout</span>
      </div>
      <div class="navbar-end">
        <span class="navbar-item" id="nav-username"
              th:text="'👋 ' + ${view.currentUser}"></span>
        <span class="navbar-item navbar-date"
              th:text="${#temporals.format(view.date, 'EEE, MMM d')}"></span>
        <a class="navbar-item navbar-github"
           href="https://github.com/mihaialexandruteodor"
           target="_blank" rel="noopener noreferrer" title="GitHub">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
               fill="currentColor" width="18" height="18" aria-hidden="true">
            <path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0 1 12 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/>
          </svg>
        </a>
      </div>
    </nav>

    <!-- ── Main content ─────────────────────────────────────────────── -->
    <section class="section">
      <div class="container">
        <div class="columns is-variable is-4">

          <!-- LEFT / MAIN COLUMN -->
          <div class="column is-8" id="col-main">

            <!-- STATUS PANEL -->
            <div id="status-panel" class="box">
              <h2 class="subtitle mb-3"><strong>Your Status</strong></h2>
              <div class="buttons">
                <button id="btn-has-food" class="button is-medium"
                        th:classappend="${view.currentUserStatus?.name() == 'HAS_FOOD'} ? ' is-success' : ''"
                        onclick="setStatus('HAS_FOOD')">
                  🥗 Has Food
                </button>
                <button id="btn-ordering" class="button is-medium"
                        th:classappend="${view.currentUserStatus?.name() == 'ORDERING'} ? ' is-warning' : ''"
                        onclick="setStatus('ORDERING')">
                  🛵 Ordering
                </button>
              </div>
            </div>

            <!-- RESTAURANT PROPOSALS -->
            <div id="proposals-panel" class="box">
              <h2 class="subtitle mb-3"><strong>Restaurant Proposals</strong></h2>
              <div id="proposals-list">
                <div th:if="${#lists.isEmpty(view.proposals)}"
                     class="has-text-grey has-text-centered py-4">
                  No proposals yet. Be the first to suggest a restaurant!
                </div>
                <div class="proposal-row" th:each="p : ${view.proposals}">
                  <div class="row-info">
                    <span class="has-text-weight-semibold" th:text="${p.restaurant}"></span>
                    <span class="tag is-info is-light ml-2"
                          th:text="${p.voteCount} + (${p.voteCount} == 1 ? ' vote' : ' votes')"></span>
                  </div>
                  <div class="row-action">
                    <button th:if="${!p.votedByCurrentUser}"
                            class="button is-small is-primary is-outlined"
                            th:onclick="'castVote(' + ${p.id} + ')'">👍 Vote</button>
                    <button th:if="${p.votedByCurrentUser}"
                            class="button is-small is-danger is-outlined"
                            th:onclick="'retractVote(' + ${p.id} + ')'">✕ Unvote</button>
                  </div>
                </div>
              </div>
              <div id="proposal-input-row" class="field has-addons mt-4"
                   th:attr="style=${view.currentUserStatus?.name() == 'ORDERING'} ? null : 'display:none'">
                <div class="control is-expanded">
                  <input id="restaurant-input" class="input" type="text"
                         placeholder="Suggest a restaurant…"
                         onkeydown="if(event.key==='Enter') addProposal();" />
                </div>
                <div class="control">
                  <button class="button is-primary" onclick="addProposal()">Add</button>
                </div>
              </div>
            </div>

            <!-- TIME PROPOSALS -->
            <div id="time-proposals-panel" class="box">
              <h2 class="subtitle mb-3"><strong>⏰ Pickup Time</strong></h2>
              <div id="time-proposals-list">
                <div th:if="${#lists.isEmpty(view.timeProposals)}"
                     class="has-text-grey has-text-centered py-4">
                  No times proposed yet. Suggest when to go pick up!
                </div>
                <div class="proposal-row" th:each="tp : ${view.timeProposals}">
                  <div class="row-info">
                    <span class="has-text-weight-semibold" th:text="${tp.proposedTime}"></span>
                    <span class="has-text-grey-light is-size-7 ml-2"
                          th:text="'by ' + ${tp.proposedBy}"></span>
                    <span class="tag is-warning is-light ml-2"
                          th:text="${tp.voteCount} + (${tp.voteCount} == 1 ? ' vote' : ' votes')"></span>
                  </div>
                  <div class="row-action">
                    <button th:if="${!tp.votedByCurrentUser}"
                            class="button is-small is-warning is-outlined"
                            th:onclick="'castTimeVote(' + ${tp.id} + ')'">👍 Vote</button>
                    <button th:if="${tp.votedByCurrentUser}"
                            class="button is-small is-danger is-outlined"
                            th:onclick="'retractTimeVote(' + ${tp.id} + ')'">✕ Unvote</button>
                  </div>
                </div>
              </div>
              <div id="time-input-row" class="field has-addons mt-4">
                <div class="control">
                  <input id="time-input" class="input" type="time"
                         onkeydown="if(event.key==='Enter') addTimeProposal();" />
                </div>
                <div class="control">
                  <button class="button is-warning" onclick="addTimeProposal()">Propose</button>
                </div>
              </div>
            </div>

          </div><!-- /col-main -->

          <!-- RIGHT / PARTICIPANTS COLUMN -->
          <div class="column is-4" id="col-participants">
            <div id="participants-panel" class="box">
              <h2 class="subtitle mb-3"><strong>Who's Here</strong></h2>
              <div id="participants-list">
                <div class="participant-row" th:each="p : ${view.participants}">
                  <span th:text="${p.userName}"></span>
                  <span class="tag"
                        th:classappend="${p.status?.name() == 'HAS_FOOD'} ? 'is-success is-light' : (${p.status?.name() == 'ORDERING'} ? 'is-warning is-light' : 'is-light')"
                        th:text="${p.status != null} ? ${p.status.name().replace('_', ' ')} : 'Undecided'"></span>
                </div>
              </div>
            </div>
          </div>

        </div>
      </div>
    </section>

    <script th:src="@{/app.js}"></script>
  </body>
</html>
